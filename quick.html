<script>

const { useState, useEffect, useRef } = React;

const INK = "#1A1033";

const CATS = [
  { id: "morning",    icon: "🌤️", label: "아침",  color: "#F5C842" },
  { id: "evening",    icon: "🌙", label: "저녁",  color: "#7B8CDE" },
  { id: "exercise",   icon: "💪", label: "운동",  color: "#FF6B6B" },

  { id: "emotion",    icon: "💭", label: "감정",  color: "#EF5350" },

const EMOTIONS = ["행복","설렘","뿌듯","상쾌","활력","편안","집중","보통","무기력","지침","긴장","답답","불안","슬픔","화남"];
const FEEL_OPTS = ["아주 잘 맞음","잘 맞음","보통","안 맞음","아주 안 맞음"];
const HYD_TYPES = [
  { key: "water",      label: "물",     ml: true },
  { key: "tea",        label: "차",     ml: true },
  { key: "coffee",     label: "커피",   ml: false },
  { key: "commercial", label: "시판",   ml: false },
  { key: "health",     label: "건강음료", cups: true },
];

function getToday() {
  const d = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Seoul" }));
  return d.toISOString().slice(0, 10);
}
function nowHM() {
  const d = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Seoul" }));
  return d.toTimeString().slice(0, 5);
}
function uid6() { return Date.now().toString(36).slice(-6); }

// ── 스타일 헬퍼 ───────────────────────────────────────
const S = {
  btn: (bg, color="#fff", extra={}) => ({
    background: bg, color, border: "none", borderRadius: 12,
    padding: "14px 0", fontSize: 15, fontWeight: 700, cursor: "pointer",
    width: "100%", ...extra
  }),
  input: {
    background: "#2A1F4A", border: "2px solid #3D2E6B", borderRadius: 10,
    color: "#fff", padding: "12px 14px", fontSize: 16, width: "100%",
  },
  label: { fontSize: 12, color: "#9B7FD4", fontWeight: 700, marginBottom: 6, display: "block" },
  row: { display: "flex", gap: 8, alignItems: "center" },
  section: { marginBottom: 16 },
};

// ── 공통 시간 입력 쌍 ─────────────────────────────────
function TimeRange({ startLabel="시작", endLabel="종료", start, end, onStart, onEnd }) {
  return e("div", { style: S.row },
    e("div", { style: { flex: 1 } },
      e("label", { style: S.label }, startLabel),
      e("input", { type: "text", inputMode: "numeric", placeholder: "00:00", value: start,
        onChange: ev => onStart(ev.target.value), style: S.input })
    ),
    e("div", { style: { color: PU, fontWeight: 900, paddingTop: 22 } }, "~"),
    e("div", { style: { flex: 1 } },
      e("label", { style: S.label }, endLabel),
      e("input", { type: "text", inputMode: "numeric", placeholder: "00:00", value: end,
        onChange: ev => onEnd(ev.target.value), style: S.input })
    )
  );
}

// ── 레벨 버튼 5개 ─────────────────────────────────────
function LevelPicker({ value, onChange }) {
  return e("div", { style: { display: "flex", gap: 8 } },
    [1,2,3,4,5].map(n =>
      e("button", {
        key: n,
        onClick: () => onChange(n),
        style: {
          flex: 1, padding: "14px 0", border: "2px solid " + (value===n ? PU : "#3D2E6B"),
          borderRadius: 10, background: value===n ? PU : "#2A1F4A",
          color: "#fff", fontSize: 18, fontWeight: 900, cursor: "pointer"
        }
      }, n)
    )
  );
}

// ── 각 폼 ─────────────────────────────────────────────
function MorningForm({ entry, onSave, onCancel }) {
  const existing = entry?.morning;
  const [lv, setLv] = useState(existing?.level ?? null);
  const [wake, setWake] = useState(existing?.wakeTime ?? nowHM());
  const [note, setNote] = useState(existing?.note ?? "");
  const save = () => {
    if (!lv) return alert("컨디션을 선택해줘요");
    onSave({ ...entry, morning: { level: lv, wakeTime: wake, note, period: existing?.period ?? false } });
  };
  return e(FormWrap, { title: "🌤️ 아침 컨디션", onCancel, onSave: save },
    e("div", { style: S.section },
      e("label", { style: S.label }, "컨디션"),
      e(LevelPicker, { value: lv, onChange: setLv })
    ),
    e("div", { style: S.section },
      e("label", { style: S.label }, "기상 시간"),
      e("input", { type: "text", inputMode: "numeric", placeholder: "07:30",
        value: wake, onChange: ev => setWake(ev.target.value), style: S.input })
    ),
    e("div", { style: S.section },
      e("label", { style: S.label }, "메모 (선택)"),
      e("input", { type: "text", placeholder: "한마디 남기기", value: note,
        onChange: ev => setNote(ev.target.value), style: S.input })
    )
  );
}

function EveningForm({ entry, onSave, onCancel }) {
  const existing = entry?.evening;
  const [lv, setLv] = useState(existing?.level ?? null);
  const [bed, setBed] = useState(existing?.bedTime ?? nowHM());
  const [note, setNote] = useState(existing?.note ?? "");
  const save = () => {
    if (!lv) return alert("컨디션을 선택해줘요");
    onSave({ ...entry, evening: { level: lv, bedTime: bed, note } });
  };
  return e(FormWrap, { title: "🌙 저녁 컨디션", onCancel, onSave: save },
    e("div", { style: S.section },
      e("label", { style: S.label }, "컨디션"),
      e(LevelPicker, { value: lv, onChange: setLv })
    ),
    e("div", { style: S.section },
      e("label", { style: S.label }, "취침 시간"),
      e("input", { type: "text", inputMode: "numeric", placeholder: "23:00",
        value: bed, onChange: ev => setBed(ev.target.value), style: S.input })
    ),
    e("div", { style: S.section },
      e("label", { style: S.label }, "메모 (선택)"),
      e("input", { type: "text", placeholder: "한마디 남기기", value: note,
        onChange: ev => setNote(ev.target.value), style: S.input })
    )
  );
}

function ExerciseForm({ entry, onSave, onCancel }) {
  const now = nowHM();
  const [start, setStart] = useState(now);
  const [end, setEnd] = useState(now);
  const [memo, setMemo] = useState("");
  const dur = () => { const [sh,sm]=start.split(":").map(Number), [eh,em]=end.split(":").map(Number); return Math.max(0,(eh*60+em)-(sh*60+sm)); };
  const save = () => {
    const d = dur();
    onSave({ ...entry, events: [...(entry.events||[]), { id: uid6(), type:"exercise", time:start, endTime:end, duration:d, memo }] });
  };
  return e(FormWrap, { title: "💪 운동", onCancel, onSave: save },
    e("div", { style: S.section },
      e(TimeRange, { startLabel:"시작", endLabel:"종료", start, end, onStart:setStart, onEnd:setEnd })
    ),
    e("div", { style: S.section },
      e("label", { style: S.label }, "메모 (선택)"),
      e("input", { type: "text", placeholder: "헬스장, 달리기...", value: memo,
        onChange: ev => setMemo(ev.target.value), style: S.input })
    )
  );
}

function MealForm({ entry, onSave, onCancel }) {
  const now = nowHM();
  const [start, setStart] = useState(now);
  const [end, setEnd] = useState(now);
  const [label, setLabel] = useState("");
  const [feel, setFeel] = useState(null);

    e("div", { style: S.section },
      e("label", { style: S.label }, "메뉴 (선택)"),
      e("input", { type: "text", placeholder: "점심, 한식, 샐러드...", value: label,
        onChange: ev => setLabel(ev.target.value), style: S.input })
    ),
    e("div", { style: S.section },
      e("label", { style: S.label }, "몸에 어땠나요? (선택)"),
      e("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
        FEEL_OPTS.map(f =>
          e("button", {
            key: f, onClick: () => setFeel(feel===f ? null : f),
            style: { padding: "8px 10px", borderRadius: 8, border: "2px solid " + (feel===f ? PU : "#3D2E6B"),
              background: feel===f ? PU : "#2A1F4A", color: "#fff", fontSize: 12, cursor: "pointer" }
          }, f)
        )
      )
    )
  );
}

function MeditationForm({ entry, onSave, onCancel }) {
  const now = nowHM();
  const [start, setStart] = useState(now);
  const [end, setEnd] = useState(now);
  const dur = () => { const [sh,sm]=start.split(":").map(Number), [eh,em]=end.split(":").map(Number); return Math.max(0,(eh*60+em)-(sh*60+sm)); };
  const save = () => {
    onSave({ ...entry, events: [...(entry.events||[]), { id: uid6(), type:"meditation", time:start, endTime:end, duration:dur() }] });
  };
  return e(FormWrap, { title: "🧘 명상", onCancel, onSave: save },
    e("div", { style: S.section },
      e(TimeRange, { startLabel:"시작", endLabel:"종료", start, end, onStart:setStart, onEnd:setEnd })
    )
  );
}

function HydrationForm({ entry, onSave, onCancel }) {
  const [hydType, setHydType] = useState("water");
  const [time, setTime] = useState(nowHM());
  const [amount, setAmount] = useState("250");
  const [cups, setCups] = useState("1");
  const [label, setLabel] = useState("");
  const ht = HYD_TYPES.find(h => h.key === hydType);
  const save = () => {
    const ev = { id: uid6(), type:"hydration", time, hydType, label };
    if (ht.ml) ev.amountMl = Number(amount)||0;
    if (ht.cups) ev.cups = Number(cups)||1;
    onSave({ ...entry, events: [...(entry.events||[]), ev] });
  };
  return e(FormWrap, { title: "💧 수분", onCancel, onSave: save },
    e("div", { style: { ...S.section, display:"flex", gap:6, flexWrap:"wrap" } },
      HYD_TYPES.map(h =>
        e("button", {
          key: h.key, onClick: () => setHydType(h.key),
          style: { padding: "10px 14px", borderRadius: 10, border: "2px solid " + (hydType===h.key ? PU : "#3D2E6B"),
            background: hydType===h.key ? PU : "#2A1F4A", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }
        }, h.label)
      )
    ),
    e("div", { style: S.section },
      e("label", { style: S.label }, "시간"),
      e("input", { type:"text", inputMode:"numeric", placeholder:"00:00",
        value: time, onChange: ev => setTime(ev.target.value), style: S.input })
    ),
    ht.ml && e("div", { style: S.section },
      e("label", { style: S.label }, "양 (ml)"),
      e("input", { type:"text", inputMode:"numeric", placeholder:"250",
        value: amount, onChange: ev => setAmount(ev.target.value), style: S.input })
    ),
    ht.cups && e("div", { style: S.section },
      e("label", { style: S.label }, "잔 수"),
      e("input", { type:"number", min:"1",
        value: cups, onChange: ev => setCups(ev.target.value), style: S.input })
    ),
    e("div", { style: S.section },
      e("label", { style: S.label }, "메모 (선택)"),
      e("input", { type:"text", placeholder:"종류, 메모...", value: label,
        onChange: ev => setLabel(ev.target.value), style: S.input })
    )
  );
}

function BathroomForm({ entry, onSave, onCancel }) {
  const FEELS = ["매우 좋음","좋음","보통","불편","매우 불편"];

      e("input", { type:"text", inputMode:"numeric", placeholder:"00:00",
        value: time, onChange: ev => setTime(ev.target.value), style: S.input })

          e("button", {
            key: f, onClick: () => setFeel(feel===f ? null : f),
            style: { padding:"10px 12px", borderRadius:8, border:"2px solid "+(feel===f?PU:"#3D2E6B"),
              background: feel===f?PU:"#2A1F4A", color:"#fff", fontSize:12, cursor:"pointer" }

function EmotionForm({ entry, onSave, onCancel }) {
  const [time, setTime] = useState(nowHM());
  const [emotion, setEmotion] = useState(null);
  const [memo, setMemo] = useState("");
  const save = () => {
    if (!emotion) return alert("감정을 선택해줘요");
    onSave({ ...entry, events: [...(entry.events||[]), { id: uid6(), type:"emotion", time, name:emotion, memo }] });
  };
  return e(FormWrap, { title: "💭 감정", onCancel, onSave: save },
    e("div", { style: S.section },
      e("label", { style: S.label }, "시간"),
      e("input", { type:"text", inputMode:"numeric", placeholder:"00:00",
        value: time, onChange: ev => setTime(ev.target.value), style: S.input })
    ),
    e("div", { style: S.section },
      e("label", { style: S.label }, "지금 감정"),
      e("div", { style: { display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6 } },
        EMOTIONS.map(em =>
          e("button", {
            key: em, onClick: () => setEmotion(em),
            style: { padding:"10px 0", borderRadius:8, border:"2px solid "+(emotion===em?PU:"#3D2E6B"),
              background: emotion===em?PU:"#2A1F4A", color:"#fff", fontSize:12, fontWeight:700, cursor:"pointer" }
          }, em)
        )
      )
    ),
    e("div", { style: S.section },
      e("label", { style: S.label }, "메모 (선택)"),
      e("input", { type:"text", placeholder:"한마디 남기기", value: memo,
        onChange: ev => setMemo(ev.target.value), style: S.input })
    )
  );
}

// ── 폼 래퍼 ───────────────────────────────────────────
function FormWrap({ title, children, onSave, onCancel }) {
  return e("div", null,
    e("div", { style: { display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 } },
      e("button", { onClick: onCancel,
        style: { background:"none", border:"none", color:PU, fontSize:15, fontWeight:700, cursor:"pointer" } }, "← 뒤로"),
      e("span", { style: { fontSize:17, fontWeight:800 } }, title)
    ),
    children,
    e("button", { onClick: onSave, style: { ...S.btn(PU), marginTop:8, fontSize:16, padding:"16px 0" } }, "저장")
  );
}

// ── 메인 앱 ───────────────────────────────────────────
function QuickApp() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [entry, setEntry] = useState(null);
  const [activeForm, setActiveForm] = useState(null);
  const [toast, setToast] = useState(null);
  const today = getToday();

  useEffect(() => auth.onAuthStateChanged(u => { setUser(u); setLoading(false); }), []);

  useEffect(() => {
    if (!user) return;
    const ref = db.collection("users").doc(user.uid).collection("data").doc(`entry:${today}`);
    return ref.onSnapshot(snap => {
      if (snap.exists) {
        try { setEntry(JSON.parse(snap.data().value)); }
        catch { setEntry({ date: today, events: [] }); }
      } else {
        setEntry({ date: today, morning: null, evening: null, events: [] });
      }
    });
  }, [user]);

  const saveEntry = async (updated) => {
    const ref = db.collection("users").doc(user.uid).collection("data").doc(`entry:${today}`);
    await ref.set({ value: JSON.stringify(updated) });
    showToast("저장됐어요 ✓");
    setActiveForm(null);
  };

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };

  if (loading) return e("div", { style: { textAlign:"center", paddingTop:80, color:PU, fontSize:15 } }, "로딩 중...");

  if (!user) return e("div", { style: { textAlign:"center", paddingTop:120, padding:"120px 24px 0" } },
    e("div", { style: { fontSize:22, fontWeight:800, marginBottom:8 } }, "BALANCE"),
    e("div", { style: { color:"#9B7FD4", marginBottom:40, fontSize:14 } }, "빠른 기록"),
    e("button", {
      onClick: () => { const p = new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(p); },
      style: { ...S.btn(PU), maxWidth:280, margin:"0 auto", display:"block", padding:"16px 0", fontSize:16, borderRadius:14 }
    }, "Google로 로그인")
  );

  const FORMS = {
    morning: e(MorningForm, { entry, onSave: saveEntry, onCancel: () => setActiveForm(null) }),
    evening: e(EveningForm, { entry, onSave: saveEntry, onCancel: () => setActiveForm(null) }),
    exercise: e(ExerciseForm, { entry, onSave: saveEntry, onCancel: () => setActiveForm(null) }),
    meal: e(MealForm, { entry, onSave: saveEntry, onCancel: () => setActiveForm(null) }),
    meditation: e(MeditationForm, { entry, onSave: saveEntry, onCancel: () => setActiveForm(null) }),
    hydration: e(HydrationForm, { entry, onSave: saveEntry, onCancel: () => setActiveForm(null) }),
    bathroom: e(BathroomForm, { entry, onSave: saveEntry, onCancel: () => setActiveForm(null) }),
    emotion: e(EmotionForm, { entry, onSave: saveEntry, onCancel: () => setActiveForm(null) }),
  };

  // 오늘 기록된 항목 체크
  const logged = new Set();
  if (entry?.morning?.level) logged.add("morning");
  if (entry?.evening?.level) logged.add("evening");
  (entry?.events||[]).forEach(ev => logged.add(ev.type));

  const [m,d] = today.slice(5).split("-").map(Number);

  return e("div", { style: { maxWidth:420, margin:"0 auto", padding:"20px 16px 40px" } },
    // 헤더
    e("div", { style: { textAlign:"center", marginBottom:24 } },
      e("div", { style: { fontSize:11, color:PU, letterSpacing:3, fontWeight:700, marginBottom:4 } }, "BALANCE"),
      e("div", { style: { fontSize:18, fontWeight:800 } }, `${m}월 ${d}일`),
      e("a", { href: "index.html", style: { fontSize:12, color:"#9B7FD4", textDecoration:"none" } }, "전체 앱 보기 →")
    ),

    // 토스트
    toast && e("div", { style: {
      background: PU, color:"#fff", borderRadius:10, padding:"12px 0",
      textAlign:"center", fontWeight:700, fontSize:14, marginBottom:16
    } }, toast),

    // 폼 or 그리드
    activeForm
      ? FORMS[activeForm]
      : e("div", { style: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 } },
          CATS.map(cat =>
            e("button", {
              key: cat.id,
              onClick: () => setActiveForm(cat.id),
              style: {
                background: "#2A1F4A",
                border: "2px solid " + (logged.has(cat.id) ? cat.color : "#3D2E6B"),
                borderRadius:16, padding:"20px 0", cursor:"pointer",
                display:"flex", flexDirection:"column", alignItems:"center", gap:8,
                position:"relative"
              }
            },
              logged.has(cat.id) && e("div", { style: {
                position:"absolute", top:8, right:10, fontSize:11,
                color: cat.color, fontWeight:800
              } }, "✓"),
              e("span", { style: { fontSize:28 } }, cat.icon),
              e("span", { style: { fontSize:13, fontWeight:700, color:"#fff" } }, cat.label)
            )
          )
        )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(QuickApp));
</script>
</body>
</html>
