const MEAL_HUNGER  = ["🌟 배고팠음","😐 그냥먹음","😞 안배고픔"];
const HUNGER_MAP   = {"🌟 배고팠음":100,"😐 그냥먹음":50,"😞 안배고픔":0};
const HEALTH_MAP   = {"🥗 건강식":100,"🙂 건강":80,"😐 보통":60,"🍟 정크":40,"🍔 완전정크":20};

  { key:"water",      label:"물",       ml:true  },

  { key:"commercial", label:"시판음료", ml:false },

];
const BATH_FEELS  = ["아주 편함","편함","보통","불편","아주 불편"];
// 웹과 동일한 레이블 + 이전 앱 레이블 하위 호환
const BATH_SCORE  = {
  "아주 편함":100,"편함":80,"보통":60,"불편":40,"아주 불편":20,
  "매우 좋음":100,"좋음":80,"매우 불편":20,
};
const LV_EMOJI    = ["","😞","😕","😐","🙂","😊"];

const DEFAULT_GOALS = {
  exerciseGoalMin: 30, meditationGoalMin: 20, fastingGoalHours: 12,
  hydrationGoalL: 1.5, healthDrinkGoal: 1, sleepGoalMinH: 6, sleepGoalMaxH: 8,
};

function computeQuickScore(entry, prevEntry, goals = DEFAULT_GOALS) {
  if(!entry) return null;
  const parts = [];

  const morningV = entry.morning ? entry.morning.level/5*100 : null;
  const eveningV = entry.evening ? entry.evening.level/5*100 : null;
  if(morningV!=null) parts.push({key:"morning", v:morningV, w:5});
  if(eveningV!=null) parts.push({key:"evening", v:eveningV, w:10});

  const meals=(entry.events||[]).filter(e=>e.type==="meal");
  const mealTimes=meals.map(e=>e.time).sort();
  const mealRated=meals.filter(e=>e.feel||e.hunger);
  let foodV=null;
  if(meals.length || mealRated.length){
    const foodSub=[];
    // 식사 간격 점수 (웹과 동일: 90분 미만 간격마다 -25점)
    if(mealTimes.length>=2){
      const gaps=[];
      for(let i=1;i<mealTimes.length;i++) gaps.push(toMin(mealTimes[i])-toMin(mealTimes[i-1]));
      foodSub.push(Math.max(0,100-gaps.filter(g=>g<90).length*25));
    }
    // feel/hunger 점수
    if(mealRated.length){
      foodSub.push(mealRated.reduce((a,e)=>{
        const q=e.feel?(HEALTH_MAP[e.feel]??60):null;
        const hv=e.hunger?(HUNGER_MAP[e.hunger]??null):null;
        if(q!=null&&hv!=null)return a+q*0.6+hv*0.4;
        if(q!=null)return a+q;
        if(hv!=null)return a+hv;
        return a+60;
      },0)/mealRated.length);
    }
    if(foodSub.length){ foodV=foodSub.reduce((a,b)=>a+b,0)/foodSub.length; parts.push({key:"food",v:foodV,w:15}); }
  }

  const hydMl=(entry.events||[]).filter(e=>e.type==="hydration"&&(e.hydType==="water"||e.hydType==="tea")).reduce((a,e)=>a+(Number(e.amountMl)||0),0);
  const hydGoal=(goals.hydrationGoalL||1.5)*1000;
  const hydV=hydMl>0?Math.min(100,hydMl/hydGoal*100):null;
  if(hydV!=null) parts.push({key:"hydration", v:hydV, w:10});

  const healthCups=(entry.events||[]).filter(e=>e.type==="hydration"&&e.hydType==="health").reduce((a,e)=>a+(Number(e.cups)||1),0);
  const healthGoal=goals.healthDrinkGoal||1;
  if(healthCups>=healthGoal) parts.push({key:"healthDrink", v:100, w:3});

  const exMin=(entry.events||[]).filter(e=>e.type==="exercise").reduce((a,e)=>a+(e.duration||0),0);
  const exGoal=goals.exerciseGoalMin||30;
  const exV=exMin>0?Math.min(100,exMin/exGoal*100):null;
  if(exV!=null) parts.push({key:"exercise", v:exV, w:15});

  const medMin=(entry.events||[]).filter(e=>e.type==="meditation").reduce((a,e)=>a+(e.duration||0),0);
  const medGoal=goals.meditationGoalMin||20;
  const medV=medMin>0?Math.min(100,medMin/medGoal*100):null;
  if(medV!=null) parts.push({key:"meditation", v:medV, w:10});

  const restMin=(entry.events||[]).filter(e=>e.type==="rest").reduce((a,e)=>a+(e.duration||0),0);

  const bathEvs=(entry.events||[]).filter(e=>e.type==="bathroom"&&e.feel);
  let bathV=null;
  if(bathEvs.length){ bathV=bathEvs.reduce((a,e)=>a+(BATH_SCORE[e.feel]??60),0)/bathEvs.length; parts.push({key:"bathroom",v:bathV,w:5}); }

  // 공복 (어제 마지막 식사 → 오늘 첫 식사)
  let fastV=null, fastVal=null;
  const prevMeals=(prevEntry?.events||[]).filter(e=>e.type==="meal").map(e=>e.time).sort();
  const todayMeals=meals.map(e=>e.time).sort();
  if(prevMeals.length && todayMeals.length){
    const fastMin=1440-toMin(prevMeals[prevMeals.length-1])+toMin(todayMeals[0]);
    const fastH=fastMin/60;
    fastV=Math.min(100,fastH/(goals.fastingGoalHours||12)*100);
    fastVal=`${fastH.toFixed(1)}h`;
    parts.push({key:"fasting", v:fastV, w:15});
  }

  // 수면 (어제 취침 → 오늘 기상)
  let sleepV=null, sleepVal=null;
  const prevBed=prevEntry?.evening?.bedTime??null;
  const wakeTime=entry.morning?.wakeTime??null;
  if(prevBed && wakeTime){
    const bedMin=toMin(prevBed), wakeMin=toMin(wakeTime);
    const sleepMin=bedMin>wakeMin ? 1440-bedMin+wakeMin : wakeMin-bedMin;
    const sleepH=sleepMin/60;
    const sMin=goals.sleepGoalMinH||6, sMax=goals.sleepGoalMaxH||8;
    sleepV=sleepH<sMin ? Math.max(0,100-Math.ceil((sMin-sleepH)/0.5)*20)
          :sleepH>sMax ? Math.max(0,100-Math.ceil((sleepH-sMax)/0.5)*10)
          :100;
    sleepVal=`${sleepH.toFixed(1)}h`;
    parts.push({key:"sleep", v:sleepV, w:12});
  }

  if(!parts.length) return null;
  const total=Math.round(parts.reduce((a,p)=>a+p.v*p.w,0)/100);

  // 전체 행 (웹과 동일한 순서)
  const allRows=[
    {key:"morning",    label:"☀️ 아침",    w:5,  v:morningV,              val:entry.morning?`${entry.morning.level}/5`:null},
    {key:"evening",    label:"🌙 저녁",    w:10, v:eveningV,              val:entry.evening?`${entry.evening.level}/5`:null},
    {key:"fasting",    label:"⏱️ 공복",    w:15, v:fastV,                 val:fastVal},
    {key:"food",       label:"🍽️ 음식",    w:15, v:foodV,                 val:meals.length?`${meals.length}회`:null},
    {key:"hydration",  label:"💧 수분",    w:10, v:hydV,                  val:hydMl>0?`${(hydMl/1000).toFixed(1)}L`:null},
    {key:"healthDrink",label:"🍵 건강음료",w:3,  v:healthCups>=1?100:null,val:healthCups>0?`${healthCups}잔`:null},
    {key:"exercise",   label:"💪 운동",    w:15, v:exV,                   val:exMin>0?fmtDur(exMin):null},
    {key:"meditation", label:"🧘 명상",    w:10, v:medV,                  val:medMin>0?fmtDur(medMin):null},
    {key:"rest",       label:"💤 휴식",    w:0,  v:null,                  val:restMin>0?fmtDur(restMin):null},
    {key:"bathroom",   label:"🚽 화장실",  w:5,  v:bathV,                 val:bathEvs.length?`${bathEvs.length}회`:null},
    {key:"sleep",      label:"😴 수면",    w:12, v:sleepV,                val:sleepVal},
  ];
  return {total, parts, allRows};
}

// ── 헬퍼 ─────────────────────────────────────────────────
function getToday() {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  return d.toISOString().slice(0,10);
}
function getDateStr(offset=0) {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  d.setDate(d.getDate()-offset);
  return d.toISOString().slice(0,10);
}
function nowHM() {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  return d.toTimeString().slice(0,5);
}
function uid6() { return Date.now().toString(36).slice(-6)+Math.random().toString(36).slice(-3); }
function fmtDate(s) { const [,m,d]=s.split("-"); return `${+m}월 ${+d}일`; }
function toMin(hm) { if(!hm)return 0; const[H,M]=hm.split(":").map(Number); return H*60+M; }
function fmtDur(min) { const H=Math.floor(min/60),M=min%60; return H?`${H}시간${M?` ${M}분`:""}`:M?`${M}분`:""; }

// ── Pico-8 저장 애니메이션 ────────────────────────────────
function SaveAnim({ onDone }) {
  useEffect(()=>{ const t=setTimeout(onDone,1800); return()=>clearTimeout(t); },[]);
  const particles = CELE.map((c,i)=>({c, x:(i%3-1)*56, y:Math.floor(i/3)*52-26}));
  return h("div",{ style:{
    position:"fixed", inset:0, background:"rgba(26,16,51,0.6)",
    backdropFilter:"blur(6px)", WebkitBackdropFilter:"blur(6px)",
    display:"flex", alignItems:"center", justifyContent:"center",
    zIndex:999, animation:"saveIn 0.3s ease-out",
  }},
    h("div",{ style:{ position:"relative", textAlign:"center" } },
      ...particles.map((p,i)=>h("div",{ key:i, style:{
        position:"absolute", top:"50%", left:"50%",
        width:10, height:10, background:p.c, borderRadius:0,
        transform:`translate(calc(-50% + ${p.x}px), calc(-50% + ${p.y}px))`,
        animation:`pixelFloat 1s ease-out ${i*0.1}s both`,
        imageRendering:"pixelated",
      }})),
      h("div",{ style:{
        ...cardSt, background:"rgba(255,255,255,0.92)",
        padding:"28px 40px", textAlign:"center",
        position:"relative", zIndex:1,
        boxShadow:"0 12px 40px rgba(155,111,199,0.3)",
      }},
        h("div",{ style:{
          width:52, height:52, margin:"0 auto 14px",
          background:PU, borderRadius:12,
          display:"flex", alignItems:"center", justifyContent:"center",
          animation:"checkPop 0.4s ease-out 0.2s both",
        }},
          h("span",{ style:{ ...PF, fontSize:16, color:"#fff" } },"✓")
        ),
        h("div",{ style:{ ...PF, fontSize:9, color:PU, letterSpacing:1, marginBottom:14 } },"SAVED!"),
        h("div",{ style:{ display:"flex", gap:4, justifyContent:"center" } },
          CELE.map((c,i)=>h("div",{ key:i, style:{
            width:16, height:8, background:c,
            animation:`barFill 1.2s ease-out ${i*0.12}s both`,
          }}))
        )
      )
    )
  );
}

// ── 공통 컴포넌트 ─────────────────────────────────────────
function MemoArea({ value, onChange, placeholder="메모 (선택)" }) {
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current){ ref.current.style.height="auto"; ref.current.style.height=ref.current.scrollHeight+"px"; }
  },[value]);
  return h("textarea",{
    ref, value, onChange:e=>onChange(e.target.value), placeholder, rows:2,
    onInput:e=>{ e.target.style.height="auto"; e.target.style.height=e.target.scrollHeight+"px"; },
    style:{ ...inputSt, lineHeight:1.6, paddingTop:12 }
  });
}

function TimeInput({ value, onChange, label }) {
  const hh=parseInt((value||"00:00").split(":")[0]);
  const isAM=hh<12;
  const toggleAP=()=>{
    const [h2,m2]=(value||"00:00").split(":").map(Number);
    const newH=isAM?(h2+12)%24:Math.max(0,h2-12);
    onChange(`${String(newH).padStart(2,"0")}:${String(m2).padStart(2,"0")}`);
  };
  return h("div",null,
    label && h("label",{ style:labelSt },label),
    h("div",{ style:{ display:"flex", gap:6, alignItems:"stretch", overflow:"visible" } },
      h("button",{ onClick:toggleAP, style:{
        background:PU, border:"none", color:"#fff",
        cursor:"pointer", borderRadius:10, padding:"0 12px",
        fontSize:13, fontWeight:800, flexShrink:0, minWidth:54, textAlign:"center",
      }},isAM?"오전":"오후"),
      // wrapper div prevents the input from being clipped
      h("div",{ style:{ flex:1, minWidth:0, overflow:"visible" } },
        h("input",{ type:"time", value, onChange:e=>onChange(e.target.value),
          style:{
            ...inputSt,
            width:"100%",
            paddingRight:8,  // give clock icon breathing room
          }
        })
      )
    )
  );
}

function TimeRange({ start, end, onStart, onEnd }) {
  return h("div",{ style:{ display:"flex", gap:10, alignItems:"flex-end" } },
    h("div",{ style:{ flex:1, minWidth:0 } }, h(TimeInput,{ value:start, onChange:onStart, label:"시작" })),
    h("div",{ style:{ color:PU, fontWeight:900, paddingBottom:14, flexShrink:0 } },"~"),
    h("div",{ style:{ flex:1, minWidth:0 } }, h(TimeInput,{ value:end, onChange:onEnd, label:"종료" }))
  );
}

}

  return h("div",{ style:{ display:"grid", gridTemplateColumns:`repeat(${options.length},1fr)`, gap:4 } },
    options.map(opt=>h("button",{
      key:opt, onClick:()=>onChange(value===opt?null:opt),
      style:{
        padding:"9px 2px", borderRadius:8, cursor:"pointer",
        fontSize:10, fontWeight:700, lineHeight:1.4, textAlign:"center",
        border:`1.5px solid ${value===opt?PU:BDR}`,
        background:value===opt?PU:"rgba(255,255,255,0.5)",
        color:value===opt?"#fff":INK, wordBreak:"keep-all",
      }
    },opt))
  );
}

function FormWrap({ title, onCancel, onSave, children }) {
  return h("div",null,
    h("div",{ style:{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 } },
      h("button",{ onClick:onCancel, style:{ background:"none", border:"none", color:PU, fontSize:15, fontWeight:700, cursor:"pointer", padding:"4px 0" } },"← 뒤로"),
      h("span",{ style:{ fontSize:15, fontWeight:800, color:INK } },title)
    ),

// ── 오늘의 흐름 ───────────────────────────────────────────
function TodayFlow({ entry, prevEntry, goals, onEditMorning, onEditEvening, onEditEvent, onDeleteEvent }) {
  const [showDetail, setShowDetail] = useState(false);

  if(!entry) return h("div",{style:{textAlign:"center",color:TXT2,paddingTop:40,fontSize:13}},"오늘 기록이 없어요");

  const score = computeQuickScore(entry, prevEntry, goals);
  const catMap = Object.fromEntries(CATS.map(c=>[c.id,c]));
  const items = [];
  if(entry.morning?.wakeTime) items.push({time:entry.morning.wakeTime,type:"wake",data:entry.morning});
  (entry.events||[]).forEach(ev=>items.push({time:ev.time,type:ev.type,data:ev}));
  if(entry.evening?.bedTime) items.push({time:entry.evening.bedTime,type:"bed",data:entry.evening});
  items.sort((a,b)=>toMin(a.time)-toMin(b.time));

  const editBtnSt = {
    background:"rgba(255,255,255,0.6)", border:`1px solid ${BDR}`, color:TXT2,
    fontSize:11, fontWeight:700, cursor:"pointer", padding:"3px 10px", borderRadius:6,
  };

  // ── 점수 카드 ──
  const scoreCard = h("div",{style:{
    ...cardSt, padding:"16px 18px", marginBottom:16,
    boxShadow:"0 2px 12px rgba(155,111,199,0.12)",
  }},
    h("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}},
      h("div",null,
        h("div",{style:{fontSize:11,color:TXT2,fontWeight:700,letterSpacing:1,marginBottom:6}},"오늘 컨디션 점수"),
        h("div",{style:{display:"flex",alignItems:"baseline",gap:4}},
          h("span",{style:{...PF,fontSize:30,color:PU,lineHeight:1}}, score ? score.total : "—"),
          score && h("span",{style:{fontSize:13,color:TXT2,fontWeight:700}},"점")
        ),
        !score && h("span",{style:{fontSize:12,color:TXT2,marginTop:6,display:"block"}},"기록을 추가하면 점수가 계산돼요")
      ),
      score && h("button",{
        onClick:()=>setShowDetail(v=>!v),
        style:{
          width:28,height:28,borderRadius:"50%",
          background:showDetail?INK:PU,border:"none",
          color:"#fff",fontWeight:900,fontSize:14,cursor:"pointer",
          flexShrink:0,
        }
      },"!")
    ),
    showDetail && score && h("div",{style:{
      marginTop:14,paddingTop:14,borderTop:`1px solid ${BDR}`,
    }},
      score.allRows.map(p=>h("div",{key:p.key,style:{
        display:"flex",alignItems:"center",gap:8,marginBottom:9,
      }},
        h("span",{style:{fontSize:12,color:p.v!=null?INK:TXT2,fontWeight:700,minWidth:82}},p.label),
        h("div",{style:{
          flex:1,background:"rgba(155,111,199,0.12)",borderRadius:4,height:6,overflow:"hidden",
        }},
          p.v!=null && h("div",{style:{height:"100%",background:p.note?"rgba(155,111,199,0.3)":PU,width:`${p.v}%`,borderRadius:4,transition:"width 0.4s ease"}})
        ),
        h("span",{style:{fontSize:11,color:TXT2,fontWeight:700,minWidth:36,textAlign:"right"}},
          p.note ? p.note : (p.val ?? "-")
        ),
        h("span",{style:{fontSize:11,color:p.v!=null?PU:"rgba(155,111,199,0.35)",fontWeight:800,minWidth:32,textAlign:"right"}},
          p.v!=null ? `${Math.round(p.v)}점` : (p.w>0?`×${p.w}`:"")
        )
      )),
      h("div",{style:{
        marginTop:8,paddingTop:8,borderTop:`1px solid ${BDR}`,
        display:"flex",justifyContent:"flex-end",alignItems:"center",
      }},
        h("span",{style:{...PF,fontSize:9,color:PU}},`합계 ${score.total}점`)
      )
    )
  );

  if(!items.length) return h("div",null,
    scoreCard,
    h("div",{style:{textAlign:"center",color:TXT2,paddingTop:20,fontSize:13}},"타임라인 기록이 없어요")
  );

  return h("div",null,
    scoreCard,
    items.map((item,i)=>{
      let icon="",text="",sub="",color=BDR;
      if(item.type==="wake"){
        icon="☀️"; color=CATS[0].color;
        text=`기상 · 컨디션 ${LV_EMOJI[item.data.level]} ${item.data.level}`;
        sub=item.data.note||"";
      } else if(item.type==="bed"){
        icon="🌙"; color=CATS[1].color;
        text=`취침 · 컨디션 ${LV_EMOJI[item.data.level]} ${item.data.level}`;
        sub=item.data.note||"";
      } else {
        const cat=catMap[item.type]; icon=cat?.icon||"·"; color=cat?.color||BDR;
        if(item.type==="exercise")   text=`운동${item.data.duration?` · ${fmtDur(item.data.duration)}`:""}${item.data.memo?` · ${item.data.memo}`:""}`;
        else if(item.type==="meal")  text=`식사${item.data.hunger?` · ${item.data.hunger}`:""}${item.data.feel?` · ${item.data.feel}`:""}${item.data.label?` · ${item.data.label}`:""}`;
        else if(item.type==="meditation") text=`명상${item.data.duration?` · ${fmtDur(item.data.duration)}`:""}${item.data.lotus?" · 결가부좌":""}`;
        else if(item.type==="hydration")  text=`수분${item.data.amountMl?` · ${item.data.amountMl}ml`:""}${item.data.cups?` · ${item.data.cups}잔`:""}${item.data.label?` · ${item.data.label}`:""}`;
        else if(item.type==="bathroom")   text=`화장실${item.data.feel?` · ${item.data.feel}`:""}`;
        else if(item.type==="emotion")    text=`감정 · ${item.data.name||""}${item.data.memo?` · ${item.data.memo}`:""}`;
        else if(item.type==="activity")   text=`활동${item.data.duration?` · ${fmtDur(item.data.duration)}`:""}${item.data.memo?` · ${item.data.memo}`:""}`;
        else if(item.type==="rest")       text=`휴식${item.data.duration?` · ${fmtDur(item.data.duration)}`:""}${item.data.memo?` · ${item.data.memo}`:""}`;
        else text=cat?.label||item.type;
      }
      return h("div",{key:i,style:{display:"flex",gap:12,paddingBottom:16,alignItems:"flex-start"}},
        h("div",{style:{textAlign:"right",minWidth:42,paddingTop:1}},
          h("span",{style:{fontSize:12,color:TXT2,fontVariantNumeric:"tabular-nums",fontWeight:700}},item.time)
        ),
        h("div",{style:{width:2,background:color,flexShrink:0,marginTop:4,minHeight:24,borderRadius:2}}),
        h("div",{style:{flex:1}},
          h("div",{style:{fontSize:13,fontWeight:700,lineHeight:1.5,color:INK}},icon+" "+text),
          sub && h("div",{style:{fontSize:12,color:TXT2,marginTop:2,lineHeight:1.4}},sub),
          h("div",{style:{display:"flex",gap:6,marginTop:6}},
            item.type==="wake"
              ? h("button",{onClick:onEditMorning,style:editBtnSt},"✏️ 수정")
              : item.type==="bed"
              ? h("button",{onClick:onEditEvening,style:editBtnSt},"✏️ 수정")
              : h("button",{onClick:()=>onEditEvent(item.data),style:editBtnSt},"✏️ 수정"),
            item.type!=="wake" && item.type!=="bed" &&
              h("button",{
                onClick:()=>{ if(confirm("삭제할까요?")) onDeleteEvent(item.data.id); },
                style:{...editBtnSt,color:"#C04040",borderColor:"rgba(192,64,64,0.3)"}
              },"🗑 삭제")
          )
        )
      );
    })
  );
}

// ── 보관함 ───────────────────────────────────────────────
function Archive({ user }) {
  const [days,setDays]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [selEntry,setSelEntry]=useState(null);

  useEffect(()=>{
    const load=async()=>{
      const results=[];
      for(let i=1;i<=14;i++){
        const dateStr=getDateStr(i);
        const snap=await db.collection("users").doc(user.uid).collection("data").doc(`entry:${dateStr}`).get();
        if(snap.exists){try{results.push({date:dateStr,entry:JSON.parse(snap.data().value)});}catch{}}
      }
      setDays(results); setLoading(false);
    };
    load();
  },[user]);

  if(loading) return h("div",{style:{textAlign:"center",color:TXT2,paddingTop:40,fontSize:13}},"불러오는 중...");
  if(!days.length) return h("div",{style:{textAlign:"center",color:TXT2,paddingTop:40,fontSize:13}},"이전 기록이 없어요");

  if(selected) return h("div",null,
    h("button",{onClick:()=>{setSelected(null);setSelEntry(null);},
      style:{background:"none",border:"none",color:PU,fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:20}
    },"← 목록"),
    h("div",{style:{fontSize:16,fontWeight:800,marginBottom:16,color:INK}},fmtDate(selected)),
    h(TodayFlow,{entry:selEntry,onEditMorning:()=>{},onEditEvening:()=>{},onEditEvent:()=>{},onDeleteEvent:()=>{}})
  );

  return h("div",null,
    days.map(({date,entry:en})=>{
      const mLv=en?.morning?.level;
      const eLv=en?.evening?.level;
      const evCount=(en?.events||[]).length;
      return h("button",{
        key:date, onClick:()=>{setSelected(date);setSelEntry(en);},
        style:{
          ...cardSt,
          width:"100%", padding:"14px 16px", marginBottom:10,
          cursor:"pointer", textAlign:"left",
          display:"flex", alignItems:"center", justifyContent:"space-between",
          border:`1.5px solid ${BDR}`,
        }
      },
        h("div",null,
          h("div",{style:{fontSize:14,fontWeight:800,color:INK,marginBottom:4}},fmtDate(date)),
          h("div",{style:{fontSize:12,color:TXT2}},`이벤트 ${evCount}개`)
        ),
        h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
          mLv && h("span",{style:{fontSize:18}},LV_EMOJI[mLv]),
          h("span",{style:{color:BDR}},"→"),
          eLv && h("span",{style:{fontSize:18}},LV_EMOJI[eLv])
        )
      );
    })
  );
}

// ── 카테고리 그리드 ───────────────────────────────────────
function CategoryGrid({ entry, onSelect }) {
  const logged=new Set();
  if(entry?.morning?.level) logged.add("morning");
  if(entry?.evening?.level) logged.add("evening");
  (entry?.events||[]).forEach(ev=>logged.add(ev.type));

  return h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
    CATS.map(cat=>{
      const done=logged.has(cat.id);
      return h("button",{
        key:cat.id, onClick:()=>onSelect(cat.id),
        style:{
          ...cardSt,
          border:`1.5px solid ${done?cat.color:BDR}`,
          borderRadius:16, padding:"18px 0", cursor:"pointer",
          display:"flex", flexDirection:"column", alignItems:"center", gap:6,
          position:"relative",
        }
      },
        done && h("div",{style:{position:"absolute",top:8,right:10,fontSize:11,color:cat.color,fontWeight:800}},"✓"),
        h("span",{style:{fontSize:26}},cat.icon),
        h("span",{style:{fontSize:12,fontWeight:700,color:INK,lineHeight:1.4,textAlign:"center",padding:"0 4px"}},cat.label)
      );
    })
  );
}

// ── 메인 앱 ─────────────────────────────────────────────
function QuickApp() {
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [entry,setEntry]=useState(null);
  const [prevEntry,setPrevEntry]=useState(null);
  const [goals,setGoals]=useState(DEFAULT_GOALS);
  const [activeForm,setActiveForm]=useState(null);
  const [editEv,setEditEv]=useState(null);
  const [tab,setTab]=useState("기록");
  const [saveAnim,setSaveAnim]=useState(false);
  const today=getToday();

  useEffect(()=>auth.onAuthStateChanged(u=>{setUser(u);setLoading(false);}),[]);
  useEffect(()=>{
    if(!user)return;
    const ref=db.collection("users").doc(user.uid).collection("data").doc(`entry:${today}`);
    const unsub=ref.onSnapshot(snap=>{
      if(snap.exists){try{setEntry(JSON.parse(snap.data().value));}catch{setEntry({date:today,events:[]});}}
      else setEntry({date:today,morning:null,evening:null,events:[]});
    });
    // 어제 데이터 (공복·수면 계산용)
    db.collection("users").doc(user.uid).collection("data").doc(`entry:${getDateStr(1)}`).get()
      .then(snap=>{ if(snap.exists){try{setPrevEntry(JSON.parse(snap.data().value));}catch{}} });
    // 목표값 (웹과 동일한 Firestore 경로)
    db.collection("users").doc(user.uid).collection("data").doc("settings:goals").get()
      .then(snap=>{ if(snap.exists){try{setGoals({...DEFAULT_GOALS,...JSON.parse(snap.data().value)});}catch{}} });
    return unsub;
  },[user]);

  const saveEntry=async(updated)=>{
    const ref=db.collection("users").doc(user.uid).collection("data").doc(`entry:${today}`);
    await ref.set({value:JSON.stringify(updated)});
    setSaveAnim(true);
    setActiveForm(null);
    setEditEv(null);
    setTab("오늘");
  };

  const deleteEvent=async(evId)=>{
    const updated={...entry,events:(entry.events||[]).filter(e=>e.id!==evId)};
    const ref=db.collection("users").doc(user.uid).collection("data").doc(`entry:${today}`);
    await ref.set({value:JSON.stringify(updated)});
  };

  const openEdit=(formType,ev=null)=>{
    setEditEv(ev);
    setActiveForm(formType);
    setTab("기록");
  };

  if(loading) return h("div",{style:{textAlign:"center",paddingTop:80,color:TXT2,fontSize:14}},"로딩 중...");

  if(!user) return h("div",{style:{maxWidth:360,margin:"0 auto",padding:"120px 24px 0",textAlign:"center"}},
    h("div",{style:{...PF,fontSize:14,color:PU,marginBottom:8,lineHeight:1.8}},"BALANCE"),
    h("div",{style:{color:TXT2,marginBottom:40,fontSize:13}},"빠른 기록"),
    h("button",{
      onClick:()=>{const p=new firebase.auth.GoogleAuthProvider();auth.signInWithPopup(p);},
      style:{background:PU,color:"#fff",border:"none",borderRadius:14,padding:"16px 0",
        fontSize:15,fontWeight:700,cursor:"pointer",width:"100%"}
    },"Google로 로그인")
  );

  const formProps={entry,onSave:saveEntry,onCancel:()=>{setActiveForm(null);setEditEv(null);}};
  const FORMS={
    morning:    h(MorningForm,{...formProps}),
    evening:    h(EveningForm,{...formProps}),
    exercise:   h(ExerciseForm,{...formProps,editEv}),
    meal:       h(MealForm,{...formProps,editEv}),
    meditation: h(MeditationForm,{...formProps,editEv}),
    hydration:  h(HydrationForm,{...formProps,editEv}),
    bathroom:   h(BathroomForm,{...formProps,editEv}),
    emotion:    h(EmotionForm,{...formProps,editEv}),
    activity:   h(ActivityForm,{...formProps,editEv}),
    rest:       h(RestForm,{...formProps,editEv}),
  };

  const [,mo,dd]=today.split("-");
  const TABS=[
    {key:"기록",icon:"📝"},
    {key:"오늘",icon:"📋"},
    {key:"보관함",icon:"📅"},
  ];

  return h("div",{style:{maxWidth:440,margin:"0 auto",paddingBottom:90}},

    saveAnim && h(SaveAnim,{onDone:()=>setSaveAnim(false)}),

    // 헤더
    h("div",{style:{
      padding:"20px 16px 14px",
      borderBottom:`1px solid ${BDR}`,
      display:"flex", alignItems:"center", justifyContent:"space-between",
    }},
      h("div",null,
        h("div",{style:{...PF,fontSize:10,color:PU,letterSpacing:1,marginBottom:3}},"BALANCE"),
        h("div",{style:{fontSize:16,fontWeight:800,color:INK}},`${+mo}월 ${+dd}일`)
      ),
      h("a",{href:"index.html",style:{
        fontSize:11,color:TXT2,textDecoration:"none",
        padding:"6px 10px",background:"rgba(255,255,255,0.6)",
        border:`1px solid ${BDR}`,borderRadius:8
      }},"전체 앱 →")
    ),

    // 본문
    h("div",{style:{padding:"16px 16px 0"}},
      activeForm
        ? FORMS[activeForm]
        : tab==="기록" ? h(CategoryGrid,{entry,onSelect:setActiveForm})
        : tab==="오늘" ? h(TodayFlow,{
            entry,
            prevEntry,
            goals,
            onEditMorning:()=>openEdit("morning"),
            onEditEvening:()=>openEdit("evening"),
            onEditEvent:(ev)=>openEdit(ev.type,ev),
            onDeleteEvent:deleteEvent,
          })
        : h(Archive,{user})
    ),

    // 하단 탭
    h("div",{style:{
      position:"fixed",bottom:0,left:0,right:0,
      background:"rgba(255,255,255,0.82)",
      backdropFilter:"blur(16px)",
      WebkitBackdropFilter:"blur(16px)",
      borderTop:`1px solid ${BDR}`,
      display:"flex",justifyContent:"space-around",padding:"10px 0 20px",
      maxWidth:440,margin:"0 auto",
    }},
      TABS.map(t=>h("button",{
        key:t.key, onClick:()=>{setActiveForm(null);setEditEv(null);setTab(t.key);},
        style:{
          background:"none",border:"none",cursor:"pointer",
          color:tab===t.key&&!activeForm?PU:"rgba(155,111,199,0.45)",
          fontWeight:700,fontSize:12,fontFamily:"inherit",
          display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 20px",
        }
      },
        h("span",{style:{fontSize:20}},t.icon),
        h("span",{style:{...PF,fontSize:6}},t.key)
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(QuickApp));
</script>
</body>
</html>
