// ── 헬퍼 ──────────────────────────────────────────────────
function getToday() {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  return d.toISOString().slice(0,10);
}
function getDateStr(offset=0) {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  d.setDate(d.getDate()-offset);
  return d.toISOString().slice(0,10);
}
function nowHM() {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  return d.toTimeString().slice(0,5);
}
function uid6() { return Date.now().toString(36).slice(-6)+Math.random().toString(36).slice(-3); }
function fmtDate(s) { const [,m,d]=s.split("-"); return `${+m}월 ${+d}일`; }
function toMin(hm) { if(!hm)return 0; const[H,M]=hm.split(":").map(Number); return H*60+M; }
function fmtDur(min) { const H=Math.floor(min/60),M=min%60; return H?`${H}시간${M?` ${M}분`:""}`:M?`${M}분`:""; }
function getDayNum() {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  const start = new Date(d.getFullYear(),0,0);
  return Math.floor((d-start)/(1000*60*60*24));
}
function calcXP(entry) {
  if(!entry) return 0;
  let xp = 0;
  if(entry.morning?.level)  xp += XP_MAP.morning;
  if(entry.evening?.level)  xp += XP_MAP.evening;
  (entry.events||[]).forEach(ev=>{ xp += XP_MAP[ev.type]||0; });
  return Math.min(xp,100);
}
function getLv(xp) {
  let r=LV_TABLE[0];
  for(const d of LV_TABLE){ if(xp>=d.min) r=d; }
  return r;
}

// ── 공통 컴포넌트 ─────────────────────────────────────────
function MemoArea({ value, onChange, placeholder="메모 (선택)" }) {
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current){ ref.current.style.height="auto"; ref.current.style.height=ref.current.scrollHeight+"px"; }
  },[value]);
  return h("textarea",{
    ref, value, onChange:e=>onChange(e.target.value), placeholder, rows:2,
    onInput:e=>{ e.target.style.height="auto"; e.target.style.height=e.target.scrollHeight+"px"; },
    style:{ ...inputSt, lineHeight:1.6, paddingTop:11 }
  });
}

function TimeInput({ value, onChange, label }) {
  const hh=parseInt((value||"00:00").split(":")[0]);
  const isAM=hh<12;
  const toggleAP=()=>{
    const [h2,m2]=(value||"00:00").split(":").map(Number);
    const newH=isAM?(h2+12)%24:Math.max(0,h2-12);
    onChange(`${String(newH).padStart(2,"0")}:${String(m2).padStart(2,"0")}`);
  };
  return h("div",null,
    label && h("label",{ style:labelSt },label),
    h("div",{ style:{ display:"flex", gap:6, alignItems:"stretch" } },
      h("button",{ onClick:toggleAP, style:{
        background:DARK, border:"none", color:WHITE,
        cursor:"pointer", borderRadius:6, padding:"0 12px",
        fontSize:13, fontWeight:800, flexShrink:0, minWidth:52, textAlign:"center",
      }},isAM?"오전":"오후"),
      h("input",{ type:"time", value, onChange:e=>onChange(e.target.value),
        style:{ ...inputSt, flex:1, minWidth:0 } })
    )
  );
}

        key:t.key, onClick:()=>setHydType(t.key),
        style:{padding:"8px 12px",borderRadius:6,
          border:`2px solid ${hydType===t.key?"#29ADFF":LGRAY}`,
          background:hydType===t.key?"#29ADFF":WHITE,
          color:hydType===t.key?WHITE:DARK,
          fontSize:12,fontWeight:700,cursor:"pointer"}
      },t.label))
    ),
    h("div",{style:secSt}, h(TimeInput,{label:"시간",value:time,onChange:setTime})),
    ht.ml && h("div",{style:secSt},
      h("label",{style:labelSt},"양 (ml)"),
      h("input",{type:"text",inputMode:"numeric",value:amount,onChange:e=>setAmount(e.target.value),placeholder:"250",style:inputSt})
    ),
    ht.cups && h("div",{style:secSt},
      h("label",{style:labelSt},"잔 수"),
      h("input",{type:"number",min:"1",value:cups,onChange:e=>setCups(e.target.value),style:inputSt})
    ),
    h("div",{style:secSt},
      h("label",{style:labelSt},"메모 (선택)"),
      h(MemoArea,{value:label,onChange:setLabel,placeholder:"종류, 메모..."})
    )
  );
}

// ── 오늘의 흐름 ───────────────────────────────────────────
function TodayFlow({ entry }) {
  if(!entry) return h("div",{style:{textAlign:"center",color:TXT2,paddingTop:40,fontSize:13}},"오늘 기록이 없어요");
  const catMap=Object.fromEntries(CATS.map(c=>[c.id,c]));
  const items=[];
  if(entry.morning?.wakeTime) items.push({time:entry.morning.wakeTime,type:"wake",data:entry.morning});
  (entry.events||[]).forEach(ev=>items.push({time:ev.time,type:ev.type,data:ev}));
  if(entry.evening?.bedTime) items.push({time:entry.evening.bedTime,type:"bed",data:entry.evening});
  items.sort((a,b)=>toMin(a.time)-toMin(b.time));
  if(!items.length) return h("div",{style:{textAlign:"center",color:TXT2,paddingTop:40,fontSize:13}},"기록이 없어요");

  return h("div",null,items.map((item,i)=>{
    let icon="",text="",sub="",color=LGRAY;
    if(item.type==="wake"){
      icon="🌤️";color=CATS[0].color;
      text=`기상 · 컨디션 ${LV_EMOJI[item.data.level]} ${item.data.level}`;
      if(item.data.note) sub=item.data.note;
    } else if(item.type==="bed"){
      icon="🌙";color=CATS[1].color;
      text=`취침 · 컨디션 ${LV_EMOJI[item.data.level]} ${item.data.level}`;
      if(item.data.note) sub=item.data.note;
    } else {
      const cat=catMap[item.type]; icon=cat?.icon||"·"; color=cat?.color||LGRAY;
      if(item.type==="exercise")   text=`운동${item.data.duration?` · ${fmtDur(item.data.duration)}`:""}${item.data.memo?` · ${item.data.memo}`:""}`;
      else if(item.type==="meal")  text=`식사${item.data.label?` · ${item.data.label}`:""}${item.data.feel?` · ${item.data.feel}`:""}`;
      else if(item.type==="meditation") text=`명상${item.data.duration?` · ${fmtDur(item.data.duration)}`:""}${item.data.lotus?" · 결가부좌":""}`;
      else if(item.type==="hydration")  text=`수분${item.data.amountMl?` · ${item.data.amountMl}ml`:""}${item.data.cups?` · ${item.data.cups}잔`:""}${item.data.label?` · ${item.data.label}`:""}`;
      else if(item.type==="bathroom")   text=`화장실${item.data.feel?` · ${item.data.feel}`:""}`;
      else if(item.type==="emotion")    text=`감정 · ${item.data.name||""}${item.data.memo?` · ${item.data.memo}`:""}`;
      else if(item.type==="activity")   text=`활동${item.data.duration?` · ${fmtDur(item.data.duration)}`:""}${item.data.memo?` · ${item.data.memo}`:""}`;
      else if(item.type==="rest")       text=`휴식${item.data.duration?` · ${fmtDur(item.data.duration)}`:""}${item.data.memo?` · ${item.data.memo}`:""}`;
      else text=cat?.label||item.type;
    }
    return h("div",{key:i,style:{display:"flex",gap:10,paddingBottom:14,alignItems:"flex-start"}},
      h("div",{style:{minWidth:40,textAlign:"right",paddingTop:2}},
        h("span",{style:{...PF,fontSize:7,color:TXT2}},item.time)
      ),
      h("div",{style:{width:3,background:color,flexShrink:0,marginTop:4,minHeight:20,borderRadius:2}}),
      h("div",{style:{flex:1}},
        h("div",{style:{fontSize:13,fontWeight:700,lineHeight:1.5,color:DARK}},icon+" "+text),
        sub && h("div",{style:{fontSize:11,color:TXT2,marginTop:2,lineHeight:1.4}},sub)
      )
    );
  }));
}

// ── 보관함 ────────────────────────────────────────────────
function Archive({ user }) {
  const [days,setDays]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [selEntry,setSelEntry]=useState(null);
  const [view,setView]=useState("stats");

  useEffect(()=>{
    const load=async()=>{
      const results=[];
      for(let i=1;i<=14;i++){
        const dateStr=getDateStr(i);
        const snap=await db.collection("users").doc(user.uid).collection("data").doc(`entry:${dateStr}`).get();
        if(snap.exists){try{results.push({date:dateStr,entry:JSON.parse(snap.data().value)});}catch{}}
      }
      setDays(results); setLoading(false);
    };
    load();
  },[user]);

  if(loading) return h("div",{style:{textAlign:"center",color:TXT2,paddingTop:40,fontSize:13}},"불러오는 중...");
  if(!days.length) return h("div",{style:{textAlign:"center",color:TXT2,paddingTop:40,fontSize:13}},"이전 기록이 없어요");

  if(selected) return h("div",null,
    h("button",{onClick:()=>{setSelected(null);setSelEntry(null);},
      style:{background:"none",border:`2px solid ${LGRAY}`,color:DARK,
        fontSize:12,fontWeight:700,cursor:"pointer",padding:"6px 10px",borderRadius:6,marginBottom:18}
    },"← 목록"),
    h("div",{style:{...PF,fontSize:10,color:DARK,marginBottom:14}},fmtDate(selected)),
    h(TodayFlow,{entry:selEntry})
  );

  // 14일 스탯 집계
  const counts={};
  CATS.forEach(c=>{counts[c.id]=0;});
  days.forEach(({entry:en})=>{
    if(en?.morning?.level) counts.morning++;
    if(en?.evening?.level) counts.evening++;
    (en?.events||[]).forEach(ev=>{if(counts[ev.type]!==undefined)counts[ev.type]++;});
  });
  const total=days.length;

  const tabBtn=(label,key)=>h("button",{
    onClick:()=>setView(key),
    style:{
      flex:1,padding:"7px 0",fontSize:11,fontWeight:700,cursor:"pointer",
      border:`2px solid ${view===key?DARK:LGRAY}`,
      borderRadius:6,
      background:view===key?DARK:WHITE,
      color:view===key?YEL:DARK,
    }
  },label);

  return h("div",null,
    h("div",{style:{display:"flex",gap:8,marginBottom:14}},
      tabBtn("PLAYER STATS","stats"),
      tabBtn("기록 목록","history")
    ),
    view==="stats"
      ? h("div",null,
          h("div",{style:{...PF,fontSize:7,color:TXT2,marginBottom:12}},`최근 ${total}일 기록`),
          CATS.map(cat=>h("div",{key:cat.id,style:{display:"flex",alignItems:"center",gap:8,marginBottom:9}},
            h("span",{style:{fontSize:15,flexShrink:0,width:22}},cat.icon),
            h("div",{style:{flex:1,height:10,background:LGRAY,borderRadius:1,overflow:"hidden",border:`1px solid ${LGRAY}`}},
              h("div",{style:{width:`${Math.round((counts[cat.id]/total)*100)}%`,height:"100%",background:cat.color,minWidth:counts[cat.id]>0?4:0}})
            ),
            h("span",{style:{...PF,fontSize:7,color:DARK,width:16,textAlign:"right",flexShrink:0}},counts[cat.id])
          ))
        )
      : h("div",null,
          days.map(({date,entry:en})=>{
            const mLv=en?.morning?.level;
            const eLv=en?.evening?.level;
            const xp=calcXP(en);
            const {bar}=getLv(xp);
            return h("button",{
              key:date, onClick:()=>{setSelected(date);setSelEntry(en);},
              style:{
                width:"100%",background:WHITE,border:`2px solid ${LGRAY}`,
                borderRadius:10,padding:"11px 13px",marginBottom:8,
                cursor:"pointer",textAlign:"left",
                display:"flex",alignItems:"center",justifyContent:"space-between",
              }
            },
              h("div",null,
                h("div",{style:{fontSize:13,fontWeight:800,color:DARK,marginBottom:5}},fmtDate(date)),
                h("div",{style:{display:"flex",alignItems:"center",gap:6}},
                  h("div",{style:{background:LGRAY,width:56,height:6,borderRadius:1,overflow:"hidden"}},
                    h("div",{style:{width:`${xp}%`,height:"100%",background:bar}})
                  ),
                  h("span",{style:{...PF,fontSize:7,color:TXT2}},`${xp}XP`)
                )
              ),
              h("div",{style:{display:"flex",gap:6,alignItems:"center"}},
                mLv ? h("span",{style:{fontSize:18}},LV_EMOJI[mLv])
                     : h("span",{style:{fontSize:11,color:LGRAY}},"미기록"),
                h("span",{style:{color:LGRAY,fontWeight:700}},"→"),
                eLv ? h("span",{style:{fontSize:18}},LV_EMOJI[eLv])
                     : h("span",{style:{fontSize:11,color:LGRAY}},"미기록")
              )
            );
          })
        )
  );
}

// ── 카테고리 그리드 ────────────────────────────────────────
function CategoryGrid({ entry, onSelect }) {
  const logged=new Set();
  if(entry?.morning?.level) logged.add("morning");
  if(entry?.evening?.level) logged.add("evening");
  (entry?.events||[]).forEach(ev=>logged.add(ev.type));

  return h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
    CATS.map(cat=>{
      const done=logged.has(cat.id);
      return h("button",{
        key:cat.id, onClick:()=>onSelect(cat.id),
        style:{
          background:done?cat.color+"18":WHITE,
          border:`2px solid ${done?cat.color:LGRAY}`,
          borderRadius:12, padding:"18px 0 14px",
          cursor:"pointer",
          display:"flex",flexDirection:"column",alignItems:"center",gap:6,
          position:"relative",
        }
      },
        done && h("div",{style:{
          position:"absolute",top:8,right:9,
          ...PF,fontSize:7,color:GRN,
          animation:"checkPop 0.3s ease-out",
        }},"✓"),
        h("span",{style:{fontSize:26}},cat.icon),
        h("span",{style:{fontSize:12,fontWeight:700,color:DARK,lineHeight:1.4,textAlign:"center",padding:"0 4px"}},cat.label),
        h("div",{style:{
          position:"absolute",bottom:0,left:0,right:0,height:3,
          background:done?cat.color:LGRAY,
          borderRadius:"0 0 10px 10px",
        }})
      );
    })
  );
}

// ── 메인 앱 ──────────────────────────────────────────────
function QuickApp() {
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [entry,setEntry]=useState(null);
  const [activeForm,setActiveForm]=useState(null);
  const [tab,setTab]=useState("기록");
  const [saveAnim,setSaveAnim]=useState(false);
  const today=getToday();

  useEffect(()=>auth.onAuthStateChanged(u=>{setUser(u);setLoading(false);}),[]);
  useEffect(()=>{
    if(!user)return;
    const ref=db.collection("users").doc(user.uid).collection("data").doc(`entry:${today}`);
    return ref.onSnapshot(snap=>{
      if(snap.exists){try{setEntry(JSON.parse(snap.data().value));}catch{setEntry({date:today,events:[]});}}
      else setEntry({date:today,morning:null,evening:null,events:[]});
    });
  },[user]);

  const saveEntry=async(updated)=>{
    const ref=db.collection("users").doc(user.uid).collection("data").doc(`entry:${today}`);
    await ref.set({value:JSON.stringify(updated)});
    setSaveAnim(true);
    setActiveForm(null);
    setTab("오늘");
  };

  if(loading) return h("div",{style:{textAlign:"center",paddingTop:80,color:TXT2,fontSize:14}},"로딩 중...");

  if(!user) return h("div",{style:{maxWidth:360,margin:"0 auto",padding:"80px 24px 0",textAlign:"center",background:BG,minHeight:"100vh"}},
    h("div",{style:{...PF,fontSize:16,color:DARK,marginBottom:6,lineHeight:2}},"BALANCE"),
    h("div",{style:{...PF,fontSize:8,color:PINK,marginBottom:40}},"WELLNESS TRACKER"),
    h("button",{
      onClick:()=>{const p=new firebase.auth.GoogleAuthProvider();auth.signInWithPopup(p);},
      style:{background:PINK,color:WHITE,border:"none",borderRadius:10,padding:"16px 0",
        fontSize:14,fontWeight:700,cursor:"pointer",width:"100%"}
    },"▶  Google로 로그인")
  );

  const FORMS={
    morning:    h(MorningForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    evening:    h(EveningForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    exercise:   h(ExerciseForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    meal:       h(MealForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    meditation: h(MeditationForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    hydration:  h(HydrationForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    bathroom:   h(BathroomForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    emotion:    h(EmotionForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    activity:   h(ActivityForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    rest:       h(RestForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
  };

  const TABS=[
    {key:"기록", icon:"📝"},
    {key:"오늘", icon:"📋"},
    {key:"보관함", icon:"📅"},
  ];

  const [,mo,dd]=today.split("-");

  return h("div",{style:{maxWidth:440,margin:"0 auto",paddingBottom:88,background:BG,minHeight:"100vh"}},

    // ── 저장 애니메이션 오버레이 ──
    saveAnim && h(SaveAnim,{onDone:()=>setSaveAnim(false)}),

    // ── 헤더 ──
    h("div",{style:{
      background:BG,
      borderBottom:`2px solid ${LGRAY}`,
      padding:"14px 16px 12px",
    }},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
        h("div",null,
          h("div",{style:{...PF,fontSize:11,color:DARK,letterSpacing:1,marginBottom:3}},"BALANCE"),
          h("div",{style:{fontSize:17,fontWeight:800,color:DARK}},`${+mo}월 ${+dd}일`)
        ),
        h("a",{href:"index.html",style:{
          fontSize:11,color:TXT2,textDecoration:"none",
          padding:"6px 10px",background:WHITE,border:`2px solid ${LGRAY}`,
          borderRadius:6,fontWeight:700,
        }},"전체 앱 →")
      )
    ),

    // ── 본문 ──
    h("div",{style:{padding:"14px 14px 0"}},
      activeForm
        ? FORMS[activeForm]
        : tab==="기록" ? h(CategoryGrid,{entry,onSelect:setActiveForm})
        : tab==="오늘" ? h(TodayFlow,{entry})
        : h(Archive,{user})
    ),

    // ── 하단 탭 ──
    h("div",{style:{
      position:"fixed",bottom:0,left:0,right:0,
      background:PU,
      display:"flex",justifyContent:"space-around",
      padding:"10px 0 22px",
      maxWidth:440,margin:"0 auto",
    }},
      TABS.map(t=>h("button",{
        key:t.key, onClick:()=>{setActiveForm(null);setTab(t.key);},
        style:{
          background:"none",border:"none",cursor:"pointer",
          color: tab===t.key&&!activeForm ? WHITE : "rgba(255,255,255,0.55)",
          fontWeight:700,fontSize:12,fontFamily:"inherit",
          display:"flex",flexDirection:"column",alignItems:"center",gap:3,
          padding:"4px 20px",
        }
      },
        h("span",{style:{fontSize:20}},t.icon),
        h("span",{style:{...PF,fontSize:6}},t.key)
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(QuickApp));
</script>
</body>
