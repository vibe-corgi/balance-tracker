// ── 헬퍼 ───────────────────────────────────────────────
function getToday() {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  return d.toISOString().slice(0,10);
}
function getDateStr(offset=0) {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  d.setDate(d.getDate()-offset);
  return d.toISOString().slice(0,10);
}
function nowHM() {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
  return d.toTimeString().slice(0,5);
}
function uid6() { return Date.now().toString(36).slice(-6)+Math.random().toString(36).slice(-3); }
function fmtDate(s) {
  const [,m,d] = s.split("-"); return `${+m}월 ${+d}일`;
}
function toMin(hm) { if(!hm)return 0; const[h,m]=hm.split(":").map(Number); return h*60+m; }
function fmtDur(min) { const h=Math.floor(min/60),m=min%60; return h?`${h}시간${m?` ${m}분`:""}`:m?`${m}분`:""; }
function parseTime(v="00:00") {
  const [H,M] = (v||"00:00").split(":").map(Number);
  const ap = H < 12 ? "오전" : "오후";
  const raw = H===0?12:H>12?H-12:H;
  const h12 = String(raw).padStart(2,"0");
  const min  = String(M||0).padStart(2,"0");
  return {ap, h12, min};
}
function buildTime(ap, h12, min) {
  let H = parseInt(h12);
  if (ap==="오전") { if(H===12) H=0; }
  else { if(H!==12) H+=12; }
  return `${String(H).padStart(2,"0")}:${min}`;
}

const inputSt = {

// ── 공통 컴포넌트 ──────────────────────────────────────
function MemoArea({ value, onChange, placeholder="메모 (선택)" }) {
  const ref = useRef(null);
  useEffect(() => {
    if(ref.current){ ref.current.style.height="auto"; ref.current.style.height=ref.current.scrollHeight+"px"; }
  }, [value]);
  return h("textarea", {
    ref, value, onChange: e=>onChange(e.target.value), placeholder, rows:2,
    onInput: e=>{ e.target.style.height="auto"; e.target.style.height=e.target.scrollHeight+"px"; },
    style: { ...inputSt, lineHeight:1.6, paddingTop:12 }
  });
}

// ── 시간 입력 (오전/오후 토글 + 네이티브 time input) ────
function TimeInput({ value, onChange, label }) {
  const hh = parseInt((value||"00:00").split(":")[0]);
  const isAM = hh < 12;

  const toggleAP = () => {
    const [h2, m2] = (value||"00:00").split(":").map(Number);
    const newH = isAM ? (h2+12)%24 : Math.max(0, h2-12);
    onChange(`${String(newH).padStart(2,"0")}:${String(m2).padStart(2,"0")}`);
  };

  return h("div", null,
    label && h("label", { style: labelSt }, label),
    h("div", { style: { display:"flex", gap:6, alignItems:"stretch" }},
      h("button", { onClick: toggleAP, style: {
        background: PU, border: "none", color: "#fff", cursor: "pointer",
        borderRadius: 10, padding: "0 10px", fontSize: 14, fontWeight: 800,
        flexShrink: 0, minWidth: 52, textAlign: "center"
      }}, isAM ? "오전" : "오후"),
      h("input", { type:"time", value, onChange: e => onChange(e.target.value),
        style: { ...inputSt, flex: 1, minWidth: 0 }})
    )
  );
}

  const [start,setStart]=useState(now);
  const [end,setEnd]=useState(now);
  const [memo,setMemo]=useState("");
  const dur=()=>Math.max(0,toMin(end)-toMin(start));
  return h(FormWrap,{title:"📖 활동",onCancel,onSave:()=>{
    onSave({...entry,events:[...(entry.events||[]),{id:uid6(),type:"activity",time:start,endTime:end,duration:dur(),memo}]});
  }},
    h("div",{style:secSt}, h(TimeRange,{start,end,onStart:setStart,onEnd:setEnd})),
    h("div",{style:secSt}, h("label",{style:labelSt},"메모"), h(MemoArea,{value:memo,onChange:setMemo,placeholder:"독서, 공부, 취미, 산책..."}))
  );
}

function RestForm({entry,onSave,onCancel}) {
  const now=nowHM();
  const [start,setStart]=useState(now);
  const [end,setEnd]=useState(now);
  const [memo,setMemo]=useState("");
  const dur=()=>Math.max(0,toMin(end)-toMin(start));
  return h(FormWrap,{title:"💤 휴식",onCancel,onSave:()=>{
    onSave({...entry,events:[...(entry.events||[]),{id:uid6(),type:"rest",time:start,endTime:end,duration:dur(),memo}]});
  }},
    h("div",{style:secSt}, h(TimeRange,{start,end,onStart:setStart,onEnd:setEnd})),
    h("div",{style:secSt}, h("label",{style:labelSt},"메모"), h(MemoArea,{value:memo,onChange:setMemo,placeholder:"낮잠, 멍때림, 음악 감상..."}))
  );
}

// ── 오늘의 흐름 ────────────────────────────────────────
function TodayFlow({ entry }) {
  if (!entry) return h("div",{style:{textAlign:"center",color:"#9B7FD4",paddingTop:40,fontSize:13}}, "오늘 기록이 없어요");
  const catMap = Object.fromEntries(CATS.map(c=>[c.id,c]));
  const items = [];
  if (entry.morning?.wakeTime) items.push({time:entry.morning.wakeTime,type:"wake",data:entry.morning});
  (entry.events||[]).forEach(ev=>items.push({time:ev.time,type:ev.type,data:ev}));
  if (entry.evening?.bedTime) items.push({time:entry.evening.bedTime,type:"bed",data:entry.evening});
  items.sort((a,b)=>toMin(a.time)-toMin(b.time));

  if(!items.length) return h("div",{style:{textAlign:"center",color:"#9B7FD4",paddingTop:40,fontSize:13}}, "기록이 없어요");

  const renderLine = (item,i) => {
    let icon="", text="", sub="";
    if(item.type==="wake") {
      icon="🌤️"; text=`기상 · 컨디션 ${LV_EMOJI[item.data.level]}${item.data.level}`;
      if(item.data.note) sub=item.data.note;
    } else if(item.type==="bed") {
      icon="🌙"; text=`취침 · 컨디션 ${LV_EMOJI[item.data.level]}${item.data.level}`;
      if(item.data.note) sub=item.data.note;
    } else {
      const cat = catMap[item.type];
      icon = cat?.icon||"•";
      if(item.type==="exercise") text=`운동${item.data.duration?` · ${fmtDur(item.data.duration)}`:""}${item.data.memo?` · ${item.data.memo}`:""}`;
      else if(item.type==="meal") text=`식사${item.data.label?` · ${item.data.label}`:""}${item.data.feel?` · ${item.data.feel}`:""}`;
      else if(item.type==="meditation") text=`명상${item.data.duration?` · ${fmtDur(item.data.duration)}`:""}${item.data.lotus?" · 결가부좌":""}`;
      else if(item.type==="hydration") text=`수분${item.data.amountMl?` · ${item.data.amountMl}ml`:""}${item.data.cups?` · ${item.data.cups}잔`:""}${item.data.label?` · ${item.data.label}`:""}`;
      else if(item.type==="bathroom") text=`화장실${item.data.feel?` · ${item.data.feel}`:""}`;
      else if(item.type==="emotion") text=`감정 · ${item.data.name||""}${item.data.memo?` · ${item.data.memo}`:""}`;
      else if(item.type==="activity") text=`활동${item.data.duration?` · ${fmtDur(item.data.duration)}`:""}${item.data.memo?` · ${item.data.memo}`:""}`;
      else if(item.type==="rest") text=`휴식${item.data.duration?` · ${fmtDur(item.data.duration)}`:""}${item.data.memo?` · ${item.data.memo}`:""}`;
      else text=cat?.label||item.type;
    }
    return h("div",{key:i,style:{display:"flex",gap:12,paddingBottom:16,alignItems:"flex-start"}},
      h("div",{style:{textAlign:"right",minWidth:42,paddingTop:1}},
        h("span",{style:{fontSize:12,color:"#9B7FD4",fontVariantNumeric:"tabular-nums",fontWeight:700}},item.time)
      ),
      h("div",{style:{width:2,background:"#3D2E6B",flexShrink:0,marginTop:4,minHeight:24}}),
      h("div",{style:{flex:1}},
        h("div",{style:{fontSize:13,fontWeight:700,lineHeight:1.5}}, icon+" "+text),
        sub && h("div",{style:{fontSize:12,color:"#9B7FD4",marginTop:3,lineHeight:1.5}}, sub)
      )
    );
  };

  return h("div", null, items.map(renderLine));
}

// ── 보관함 ─────────────────────────────────────────────
function Archive({ user }) {
  const [days, setDays] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const [selEntry, setSelEntry] = useState(null);

  useEffect(() => {
    const load = async () => {
      const results = [];
      for (let i=1; i<=14; i++) {
        const dateStr = getDateStr(i);
        const snap = await db.collection("users").doc(user.uid).collection("data").doc(`entry:${dateStr}`).get();
        if (snap.exists) {
          try { results.push({ date:dateStr, entry:JSON.parse(snap.data().value) }); }
          catch {}
        }
      }
      setDays(results);
      setLoading(false);
    };
    load();
  }, [user]);

  if (loading) return h("div",{style:{textAlign:"center",color:PU,paddingTop:40,fontSize:13}}, "불러오는 중...");
  if (!days.length) return h("div",{style:{textAlign:"center",color:"#9B7FD4",paddingTop:40,fontSize:13}}, "이전 기록이 없어요");

  if (selected) return h("div", null,
    h("button",{onClick:()=>{setSelected(null);setSelEntry(null);},
      style:{background:"none",border:"none",color:PU,fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:20}}, "← 목록"),
    h("div",{style:{fontSize:16,fontWeight:800,marginBottom:16}}, fmtDate(selected)),
    h(TodayFlow,{entry:selEntry})
  );

  return h("div", null,
    days.map(({date,entry:en}) => {
      const mLv = en?.morning?.level;
      const eLv = en?.evening?.level;
      const evCount = (en?.events||[]).length;
      return h("button",{
        key:date, onClick:()=>{ setSelected(date); setSelEntry(en); },
        style:{
          width:"100%", background:"#2A1F4A", border:"2px solid #3D2E6B", borderRadius:12,
          padding:"14px 16px", marginBottom:10, cursor:"pointer", textAlign:"left",
          display:"flex", alignItems:"center", justifyContent:"space-between"
        }
      },
        h("div", null,
          h("div",{style:{fontSize:14,fontWeight:800,color:"#fff",marginBottom:4}}, fmtDate(date)),
          h("div",{style:{fontSize:12,color:"#9B7FD4"}}, `이벤트 ${evCount}개`)
        ),
        h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
          mLv && h("span",{style:{fontSize:18}}, LV_EMOJI[mLv]),
          h("span",{style:{color:"#3D2E6B"}},"→"),
          eLv && h("span",{style:{fontSize:18}}, LV_EMOJI[eLv])
        )
      );
    })
  );
}

// ── 카테고리 그리드 ────────────────────────────────────
function CategoryGrid({ entry, onSelect }) {
  const logged = new Set();
  if(entry?.morning?.level) logged.add("morning");
  if(entry?.evening?.level) logged.add("evening");
  (entry?.events||[]).forEach(ev=>logged.add(ev.type));

  return h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
    CATS.map(cat=>h("button",{
      key:cat.id, onClick:()=>onSelect(cat.id),
      style:{
        background:"#2A1F4A", border:"2px solid "+(logged.has(cat.id)?cat.color:"#3D2E6B"),
        borderRadius:16, padding:"18px 0", cursor:"pointer",
        display:"flex", flexDirection:"column", alignItems:"center", gap:6,
        position:"relative"
      }
    },
      logged.has(cat.id) && h("div",{style:{position:"absolute",top:8,right:10,fontSize:11,color:cat.color,fontWeight:800}}, "✓"),
      h("span",{style:{fontSize:26}}, cat.icon),
      h("span",{style:{fontSize:12,fontWeight:700,color:"#fff",lineHeight:1.4,textAlign:"center",padding:"0 4px"}}, cat.label)
    ))
  );
}

// ── 메인 앱 ───────────────────────────────────────────
function QuickApp() {
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [entry,setEntry]=useState(null);
  const [activeForm,setActiveForm]=useState(null);
  const [tab,setTab]=useState("기록");
  const [toast,setToast]=useState(null);
  const today=getToday();

  useEffect(()=>auth.onAuthStateChanged(u=>{setUser(u);setLoading(false);}),[]);
  useEffect(()=>{
    if(!user)return;
    const ref=db.collection("users").doc(user.uid).collection("data").doc(`entry:${today}`);
    return ref.onSnapshot(snap=>{
      if(snap.exists){try{setEntry(JSON.parse(snap.data().value));}catch{setEntry({date:today,events:[]});}}
      else setEntry({date:today,morning:null,evening:null,events:[]});
    });
  },[user]);

  const saveEntry = async (updated) => {
    const ref=db.collection("users").doc(user.uid).collection("data").doc(`entry:${today}`);
    await ref.set({value:JSON.stringify(updated)});
    setToast("저장됐어요 ✓");
    setTimeout(()=>setToast(null),2500);
    setActiveForm(null);
    setTab("오늘");
  };

  if(loading) return h("div",{style:{textAlign:"center",paddingTop:80,color:PU,fontSize:14}},"로딩 중...");

  if(!user) return h("div",{style:{maxWidth:360,margin:"0 auto",padding:"120px 24px 0",textAlign:"center"}},
    h("div",{style:{fontFamily:"'Press Start 2P'",fontSize:14,color:PU,marginBottom:8,lineHeight:1.8}},"BALANCE"),
    h("div",{style:{color:"#9B7FD4",marginBottom:40,fontSize:13}},"빠른 기록"),
    h("button",{
      onClick:()=>{const p=new firebase.auth.GoogleAuthProvider();auth.signInWithPopup(p);},
      style:{background:PU,color:"#fff",border:"none",borderRadius:14,padding:"16px 0",
        fontSize:15,fontWeight:700,cursor:"pointer",width:"100%"}
    },"Google로 로그인")
  );

  const FORMS = {
    morning:    h(MorningForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    evening:    h(EveningForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    exercise:   h(ExerciseForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    meal:       h(MealForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    meditation: h(MeditationForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    hydration:  h(HydrationForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    bathroom:   h(BathroomForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    emotion:    h(EmotionForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    activity:   h(ActivityForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
    rest:       h(RestForm,{entry,onSave:saveEntry,onCancel:()=>setActiveForm(null)}),
  };

  const [,mo,dd] = today.split("-");
  const TABS = ["기록","오늘","보관함"];

  return h("div",{style:{maxWidth:440,margin:"0 auto",paddingBottom:90}},
    // 상단 헤더
    h("div",{style:{
      padding:"20px 16px 14px", borderBottom:"1px solid #2A1F4A",
      display:"flex", alignItems:"center", justifyContent:"space-between"
    }},
      h("div",null,
        h("div",{style:{fontFamily:"'Press Start 2P'",fontSize:10,color:PU,letterSpacing:1,marginBottom:3}},"BALANCE"),
        h("div",{style:{fontSize:16,fontWeight:800}}, `${+mo}월 ${+dd}일`)
      ),
      h("a",{href:"index.html",style:{fontSize:11,color:"#9B7FD4",textDecoration:"none",padding:"6px 10px",
        background:"#2A1F4A",borderRadius:8}}, "전체 앱 →")
    ),

    // 토스트
    toast && h("div",{style:{
      background:PU,color:"#fff",padding:"12px 0",textAlign:"center",
      fontWeight:700,fontSize:14,marginBottom:0
    }},toast),

    // 본문
    h("div",{style:{padding:"16px 16px 0"}},
      activeForm
        ? FORMS[activeForm]
        : tab==="기록" ? h(CategoryGrid,{entry,onSelect:setActiveForm})
        : tab==="오늘" ? h(TodayFlow,{entry})
        : h(Archive,{user})
    ),

    // 하단 탭
    h("div",{style:{
      position:"fixed",bottom:0,left:0,right:0,
      background:"#1A1033",borderTop:"2px solid #2A1F4A",
      display:"flex",justifyContent:"space-around",padding:"10px 0 20px",
      maxWidth:440,margin:"0 auto"
    }},
      TABS.map(t=>h("button",{
        key:t, onClick:()=>{setActiveForm(null);setTab(t);},
        style:{
          background:"none",border:"none",cursor:"pointer",
          color:tab===t&&!activeForm?PU:"#9B7FD4",
          fontWeight:700,fontSize:12,fontFamily:"inherit",
          display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 20px"
        }
      },
        h("span",{style:{fontSize:20}}, t==="기록"?"📝":t==="오늘"?"📋":"📅"),
        h("span",null, t)
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(QuickApp));
</script>
</body>
</html>
