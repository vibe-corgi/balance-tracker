    firebase.initializeApp(firebaseConfig);
    const _auth = firebase.auth();
    const _db   = firebase.firestore();
    const _provider = new firebase.auth.GoogleAuthProvider();

    // Google 로그인 — redirect 방식 (팝업은 COOP 정책에 막힘)
    window._balanceSignIn = () => {
      // popup 방식 — COOP 경고는 무해하고 실제 로그인은 작동함
      return _auth.signInWithPopup(_provider).catch(err => {
        // popup blocked? fallback to redirect
        if (err.code === 'auth/popup-blocked' || err.code === 'auth/popup-closed-by-user') {
          return _auth.signInWithRedirect(_provider);
        }
        throw err;
      });
    };
    window._balanceSignOut = () => _auth.signOut();
    window._balanceOnAuth  = (cb) => _auth.onAuthStateChanged(cb);

    // Firestore-primary storage shim — Firestore is source of truth, localStorage is write-cache & offline fallback
    window.storage = {
      _uid() { return _auth.currentUser?.uid; },
      _lsKey(uid, key) { return `balance_${uid}_${key}`; },
      _pendingKey(uid) { return `balance_pending_${uid}`; },
      _lsListKeys(uid, prefix) {
        const out = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          const pre = `balance_${uid}_`;
          if (k && k.startsWith(pre)) {
            const dataKey = k.slice(pre.length);
            if (!prefix || dataKey.startsWith(prefix)) out.push(dataKey);
          }
        }
        return out;
      },
      async flushPending(uid) {
        const uid_ = uid || this._uid();
        if (!uid_) return;
        const raw = localStorage.getItem(this._pendingKey(uid_));
        if (!raw) return;
        const pending = JSON.parse(raw);
        const remaining = [];
        for (const { key, value } of pending) {
          try {
            await _db.collection("users").doc(uid_).collection("data").doc(key).set({ value });
          } catch(e) { remaining.push({ key, value }); }
        }
        remaining.length
          ? localStorage.setItem(this._pendingKey(uid_), JSON.stringify(remaining))
          : localStorage.removeItem(this._pendingKey(uid_));
      },
      async get(key) {
        const uid = this._uid();
        if (!uid) return null;
        // Firestore first — ensures cross-device sync
        try {
          const snap = await _db.collection("users").doc(uid).collection("data").doc(key).get();
          if (snap.exists) {
            localStorage.setItem(this._lsKey(uid, key), JSON.stringify(snap.data().value));
            return { key, value: snap.data().value };
          }
          return null;
        } catch(e) {
          // Offline fallback to localStorage
          const local = localStorage.getItem(this._lsKey(uid, key));
          if (local) return { key, value: JSON.parse(local) };
          return null;
        }
      },
      async set(key, value) {
        const uid = this._uid();
        if (!uid) throw new Error("not logged in");
        // Write to localStorage immediately (instant UI update)
        localStorage.setItem(this._lsKey(uid, key), JSON.stringify(value));
        // Write to Firestore; queue for retry if offline
        try {
          await _db.collection("users").doc(uid).collection("data").doc(key).set({ value });
          console.log("✅ Firestore 저장 성공:", key);
        } catch(e) {
          console.error("🔴 Firestore 저장 실패:", key, e.code, e.message);
          const raw = localStorage.getItem(this._pendingKey(uid));
          const pending = raw ? JSON.parse(raw) : [];
          const idx = pending.findIndex(p => p.key === key);
          if (idx >= 0) pending[idx].value = value; else pending.push({ key, value });
          localStorage.setItem(this._pendingKey(uid), JSON.stringify(pending));
        }
        return { key, value };
      },
      async list(prefix) {
        const uid = this._uid();
        if (!uid) return { keys: [] };
        return { keys: this._lsListKeys(uid, prefix) };
      }
    };

    // redirect result 처리 (onAuthStateChanged가 자동으로 감지)
    // React 앱에게 Firebase 준비 완료 신호
    window.dispatchEvent(new Event('firebaseReady'));

// Canvas-based screenshot (html2canvas) hits "tainted canvas" security errors here because
// our external font imports (Google Fonts / Galmuri CDN) aren't CORS-clean inside the sandboxed
// artifact iframe. Instead of a PNG, we download a self-contained HTML snapshot with all
// current styles inlined — same approach that worked for the 윤소정 boundary-scheduler project.
function captureElementAsHtml(el, filename, title) {
  const clone = el.cloneNode(true);
  clone.querySelectorAll("button").forEach(b => {
    b.style.pointerEvents = "none";
  });
  clone.querySelectorAll("input, textarea").forEach(i => {
    i.setAttribute("readonly", "true");
  });
  const rect = el.getBoundingClientRect();
  clone.style.width = rect.width + "px";
  clone.style.maxWidth = rect.width + "px";
  const styleTags = [...document.querySelectorAll("style")].map(s => s.outerHTML).join("\n");
  const linkTags = [...document.querySelectorAll('link[rel="stylesheet"]')].map(l => l.outerHTML).join("\n");
  const html = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=${Math.round(rect.width + 48)}" />
<title>${title}</title>
${linkTags}
${styleTags}
<style>body{margin:0;padding:24px;background:#F5EFFF;display:flex;justify-content:center;}body>*{flex-shrink:0;}</style>
</head>
<body>
${clone.outerHTML}
</body>
</html>`;
  const blob = new Blob([html], {
    type: "text/html"
  });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.download = filename;
  link.href = url;
  link.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}
